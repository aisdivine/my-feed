# ─────────────────────────────────────────────────────────────────────────
# Your feed sources. Add/remove freely. Each source has:
#   name:   display label
#   type:   rss | reddit
#   url:    the feed URL (rss) or subreddit JSON (reddit)
#   weight: 0.0–2.0 multiplier on the rank score (higher = floats up)
#   tag_hint: optional default category if the LLM is unsure
# ─────────────────────────────────────────────────────────────────────────

# Tune how aggressively the LLM filters. The build keeps items whose
# relevance score is >= min_score (0–10). Higher = stricter / higher quality.
min_score: 6

# Curation — a tight, high-quality digest of roughly the last week.
max_items: 28        # hard cap on total stories shown
max_per_source: 7    # no single source can flood the feed
max_age_hours: 168   # ~1 week window; quality leads, recency tilts

# A short description of YOU — what you care about. The LLM scores each item's
# relevance against this. Edit it to reshape the whole feed.
interests: >
  AI and machine learning, software engineering and developer tools,
  startups and tech business, science and space, and significant world news.
  Especially interested in major acquisitions, mergers, and M&A deals —
  particularly large or notable ones in tech, AI, and startups; rank those
  highly. Also especially interested in "physical AI" / "physics AI" — large
  physics models, AI-for-science, autonomous labs, world models, and robotics
  foundation models — and the companies in that space (PhysicsX, Periodic Labs,
  Lila Sciences, World Labs, Physical Intelligence, Figure, Prometheus, P-1 AI,
  General Intuition); rank these highly too. Not interested in crypto price
  talk, celebrity gossip, or low-effort outrage.

sources:
  # ── Hacker News (only stories above the points threshold = instant filter) ──
  - name: Hacker News
    type: rss
    url: https://hnrss.org/frontpage?points=150
    weight: 1.3
    tag_hint: tech

  # ── World / general news (Google News top stories RSS) ──
  - name: World News
    type: rss
    url: https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en
    weight: 1.0
    tag_hint: world

  # ── Reddit (native RSS, top of the week) ──
  # NOTE: Reddit's JSON API (type: reddit) 403s from cloud/datacenter IPs like
  # GitHub Actions. The .rss endpoints below are far more reliable there. If
  # even these get rate-limited (429) in Actions, route them through RSSHub:
  #   https://<your-rsshub>/reddit/r/technology/top/day
  - name: r/technology
    type: rss
    url: https://www.reddit.com/r/technology/top/.rss?t=week
    weight: 0.9
    tag_hint: tech

  - name: r/worldnews
    type: rss
    url: https://www.reddit.com/r/worldnews/top/.rss?t=week
    weight: 0.9
    tag_hint: world

  # ── Acquisitions / M&A (Google News search, last 7 days) ──
  - name: Acquisitions
    type: rss
    url: https://news.google.com/rss/search?q=%28acquires%20OR%20acquisition%20OR%20merger%29%20%28tech%20OR%20AI%20OR%20startup%29%20when%3A7d&hl=en-US&gl=US&ceid=US:en
    weight: 1.2
    tag_hint: business

  # ── Physical AI / physics AI / AI-for-science (Google News search, last 7 days) ──
  # Covers the category + the named players (PhysicsX, Periodic Labs, Lila
  # Sciences, World Labs, Physical Intelligence, Figure, General Intuition, …).
  - name: Physical AI
    type: rss
    url: https://news.google.com/rss/search?q=%28%22physical%20AI%22%20OR%20%22physics%20AI%22%20OR%20%22large%20physics%20model%22%20OR%20%22AI%20scientist%22%20OR%20PhysicsX%20OR%20%22Periodic%20Labs%22%20OR%20%22Lila%20Sciences%22%20OR%20%22World%20Labs%22%20OR%20%22Figure%20AI%22%20OR%20%22Physical%20Intelligence%22%20OR%20%22General%20Intuition%22%29%20when%3A7d&hl=en-US&gl=US&ceid=US:en
    weight: 1.3
    tag_hint: ai

# ─────────────────────────────────────────────────────────────────────────
# Twitter / X accounts. These pull ONLY when rsshub_base is set — X has no
# free native RSS, so a RSSHub bridge is required. Each account becomes one
# RSS source (rsshub_base + /twitter/user/<handle>).
#
# To activate:
#   1. Run RSSHub on an always-on box:  docker run -d -p 1200:1200 diygod/rsshub
#      (X blocks unauthenticated scraping from cloud IPs — you'll likely need to
#       supply auth tokens to RSSHub; see its Twitter route docs.)
#   2. Expose it at a public https URL (e.g. via a tunnel or your own domain).
#   3. Put that URL in rsshub_base below. Done — all accounts light up.
# ─────────────────────────────────────────────────────────────────────────
twitter:
  rsshub_base: ""        # e.g. https://your-rsshub.example.com  (empty = off)
  weight: 1.1
  tag_hint: ai
